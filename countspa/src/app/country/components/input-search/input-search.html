<section class="flex flex-row gap-2 mt-2">
    <input 
    type="text"
    class=" input input-bordered mr-2 w-56"
    [placeholder]="placeholder()"
    autofocus
    #txtSearch
    (input)="onTyping(txtSearch.value)"
    (keyup.enter)="onSubmit(txtSearch.value)"
    />

    <button class="bg-[rgb(149,62,16)] btn" (click)="onSubmit(txtSearch.value)">Buscar</button>
</section>
